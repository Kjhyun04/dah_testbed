# srsenb (srsRAN 4G eNB) — ZMQ 가상 RF, Open5GS MME 접속
# ⚠️ sib.conf/rr.conf/rb.conf 는 srsRAN 기본 예제(이미지 내 /etc/srsran/)를 사용.
#    MME_IP/ENB_IP 는 compose 에서 치환. ★ZMQ rx_port 대상이 핵심 튜닝점(아래).

[enb]
enb_id      = 0x19B
mcc         = 001
mnc         = 01
mme_addr    = MME_IP          # Open5GS MME (S1AP/SCTP 36412)
gtp_bind_addr = ENB_IP        # S1-U (GTP-U → SGW-U)
s1c_bind_addr = ENB_IP        # S1-MME
n_prb       = 50
tm          = 1
nof_ports   = 1

[enb_files]
sib_config = sib.conf
rr_config  = rr.conf
rb_config  = rb.conf

[rf]
device_name = zmq
# 단일UE(G0): enb tx bind 2000, rx 는 UAV-UE 의 tx(2001)에 연결.
# ★멀티UE: rx_port 를 gr-broker 로 바꾸고 broker 가 UE들과 매핑.
device_args = fail_on_disconnect=true,tx_port=tcp://*:2000,rx_port=tcp://dah4g-uav-ue:2001,id=enb,base_srate=23.04e6

[log]
all_level = info
filename  = /tmp/enb.log

[pcap]
enable = false
