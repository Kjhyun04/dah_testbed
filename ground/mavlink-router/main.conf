# mavlink-router 설정 (M0)
# 역할: 무선 MAVLink 구간(=air의 TCP)을 지상 클라이언트들로 fan-out.
# 라우터는 서명을 하지 않는 "패스스루"다 — 서명은 종단점(FC↔지상 서명 종단점) end-to-end.
# 주의: mavlink-router 는 'Key=Value' 뒤 인라인 주석을 지원하지 않는다(값으로 파싱됨).
#       주석은 반드시 별도 줄(#)에 둘 것.

[General]
# 라우터 TCP 서버: QGroundControl 이 TCP 로 접속(UDP Server 모드보다 안정적).
TcpServerPort=5790
ReportStats=false
MavlinkDialect=auto
DebugLogLevel=info

# 공중 C2 링크: C2 채널 에뮬레이터(재밍 가능) 경유. 채널이 air:5760에 TCP 연결.
[UdpEndpoint c2channel]
Mode=Normal
Address=172.28.0.50
Port=14570

# 지상: QGroundControl (호스트에서 UDP 14550 접속)
[UdpEndpoint qgc]
Mode=Server
Address=0.0.0.0
Port=14550

# 지상: 텔레메트리 점검 / VSM(서명) 종단점 (UDP 14551)
[UdpEndpoint ground-clients]
Mode=Server
Address=0.0.0.0
Port=14551

# GPS 채널: gnss 컨테이너 전용 엔드포인트 (UDP 14552)
[UdpEndpoint gnss]
Mode=Server
Address=0.0.0.0
Port=14552

# 페이로드 컴포넌트(카메라/짐벌) 전용 엔드포인트 (UDP 14553)
[UdpEndpoint payload]
Mode=Server
Address=0.0.0.0
Port=14553

# 웹 로그뷰어 전용 엔드포인트 (UDP 14554)
[UdpEndpoint logviewer]
Mode=Server
Address=0.0.0.0
Port=14554

# (예약) 다중링크 failover: #4에서 활성화
# [UdpEndpoint primary-satellite]
# Mode=Normal
# Address=<sat-gw>
# Port=14555
# [UdpEndpoint secondary-rf]
# Mode=Normal
# Address=<rf-gw>
# Port=14556
