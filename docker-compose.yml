# DAH 테스트베드 — 브로드캐스트 RF 매질 구성
# 공중(ArduPilot SITL) ↔ C2 매질(브로드캐스트 허브) ↔ dahnet 브로드캐스트 세그먼트
#
# 변경(P-17~P-20, P-26): router(fan-out) 제거. c2channel 이 air(TCP)와
# dahnet UDP 브로드캐스트를 잇는 무선 매질 허브 역할.
#   - 다운링크: air 텔레메트리 → 172.28.255.255:14550 방사(누구나 수동 도청)
#   - 업링크:   172.28.255.255:14555 → c2channel → air(FC)
# QGC 대신 gcs_cli.py(tools 컨테이너)로 제어한다.
name: dah-testbed

# 공용 브로드캐스트 파라미터
x-bcast: &bcast
  BCAST: "172.28.255.255"
  DOWN_PORT: "14550"
  UP_PORT: "14555"

services:
  # ── 공중 계층: ArduPilot SITL + Gazebo Harmonic (ArduCopter) ─────
  # P-15 물리엔진 + P-23 VNC GUI + P-24 SITL↔Gazebo(localhost FDM) + P-25 카메라.
  # 비행역학/카메라=Gazebo, GPS=외부 채널(gnss). Gazebo GUI: http://localhost:6080/vnc.html
  air:
    build:
      context: ./air
      args:
        ARDUPILOT_TAG: ${ARDUPILOT_TAG:-Copter-4.5}
    container_name: dah-air
    expose:
      - "5760"
    ports:
      - "6080:6080"             # noVNC(Gazebo GUI) — 브라우저 관측(P-23)
    environment:
      CAM_HOST: ${CAM_HOST:-host.docker.internal}  # 카메라 RTP 수신 측(지상/호스트)
      CAM_PORT: ${CAM_PORT:-5600}
      HOME_LOC: ${HOME_LOC:-37.5665,126.9780,30,0}
      GZ_HEADLESS: ${GZ_HEADLESS:-0}               # 1이면 GUI/VNC 생략(서버만)
    extra_hosts:
      - "host.docker.internal:host-gateway"        # 카메라 RTP를 호스트로 송출
    shm_size: "1gb"            # Gazebo 렌더링용 공유메모리
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.10

  # ── C2 링크 매질(B): air(TCP) ↔ 브로드캐스트 허브 + 재밍/failover ──
  c2channel:
    build:
      context: ./rf/channel
    container_name: dah-c2channel
    depends_on: [air]
    environment:
      <<: *bcast
      AIR: tcp:172.28.0.10:5760
    volumes:
      - ./rf/channel/ctrl:/ctrl
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.50

  # ── GPS 채널(A1, 라이브): SIMSTATE(다운링크) → GPS_INPUT(업링크) ──
  gnss:
    build:
      context: ./rf
    container_name: dah-gnss
    depends_on: [c2channel]
    command: ["run"]
    environment:
      <<: *bcast
      GPS_SOURCE: ${GPS_SOURCE:-A1}   # A1 외 값이면 대기(미송출) — A2와 충돌 방지
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.30

  # ── GPS 채널(A2): 실제 I/Q (gps-sdr-sim → GNSS-SDR) ────────────
  # profile "iq" — 기본 up 에선 안 뜸. A1(gnss)과 GPS 소스가 충돌하므로
  # A2 사용 시: docker compose stop gnss && docker compose --profile iq up -d sdr
  sdr:
    build:
      context: ./rf/sdr
    image: dah-sdr
    container_name: dah-sdr
    profiles: ["iq"]
    depends_on: [c2channel]
    environment:
      <<: *bcast
      LAT: ${IQ_LAT:-37.5665}
      LON: ${IQ_LON:-126.9780}
      ALT: ${IQ_ALT:-30}
      DUR: ${IQ_DUR:-180}
    networks:
      dahnet:
        ipv4_address: 172.28.0.40

  # ── 페이로드 채널(C): 카메라/짐벌 MAVLink + KLV(ST0601) ─────────
  payload:
    build:
      context: ./payload
    container_name: dah-payload
    depends_on: [c2channel]
    environment:
      <<: *bcast
      KLV_DEST: 172.28.255.255:14580   # KLV 도 dahnet 브로드캐스트(도청 가능)
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.60

  # ── 페이로드 영상(C.2): 테스트패턴 폴백 (P-25 이후 기본 비활성) ──
  # 기본 영상원은 이제 air의 Gazebo 카메라(iris_with_gimbal → 5600 RTP, P-25).
  # Gazebo 카메라가 불가/과부하한 환경에서만 테스트패턴으로 폴백:
  #   docker compose --profile testvid up -d video
  video:
    build:
      context: ./video
    container_name: dah-video
    profiles: ["testvid"]
    environment:
      DEST: host.docker.internal
      PORT: "5600"
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.70

  # ── 웹 로그뷰어: 다운링크 브로드캐스트 수동 수신 대시보드 ───────
  logviewer:
    build:
      context: ./logviewer
    container_name: dah-logviewer
    depends_on: [c2channel]
    environment:
      CONN: udpin:0.0.0.0:14550
    volumes:
      - ./rf/channel/ctrl:/ctrl:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.80

  # ── 지상 도구: 진단(verify_all 등) + 제어(gcs_cli) 실행 컨테이너 ──
  # QGC 대체. 브로드캐스트 세그먼트 안에서 실행해야 하므로 dahnet 컨테이너로 둔다.
  #   docker compose exec tools python scripts/verify_all.py
  #   docker compose exec tools python gcs_cli.py arm
  tools:
    build:
      context: ./tools
    container_name: dah-tools
    depends_on: [c2channel]
    environment:
      <<: *bcast
    volumes:
      - ./scripts:/work/scripts:ro
      - ./gcs_cli.py:/work/gcs_cli.py:ro
    restart: unless-stopped
    networks:
      dahnet:
        ipv4_address: 172.28.0.90

networks:
  dahnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
